# This pipeline triggers on Git tags (releases)
# To create a release, tag a commit: git tag v1.0.0 && git push origin v1.0.0

trigger:
  tags:
    include:
      - 'v*'
  branches:
    exclude:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.12'
  uvVersion: '0.10.10'

stages:
{%- if cookiecutter.publish_to_pypi == "y" %}

  - stage: SetVersion
    displayName: 'Set Release Version'
    jobs:
      - job: SetVersionJob
        displayName: 'Extract and set version from tag'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Set up Python $(pythonVersion)'

          - script: |
              pip install uv==$(uvVersion)
            displayName: 'Install uv'

          - script: |
              # Extract version from tag (e.g., v1.0.0 -> 1.0.0)
              TAG=$(Build.SourceBranch)
              VERSION=${TAG#refs/tags/v}
              echo "##vso[task.setvariable variable=releaseVersion]$VERSION"
              sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
            displayName: 'Update version in pyproject.toml'

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(System.DefaultWorkingDirectory)/pyproject.toml'
              ArtifactName: 'pyproject-toml'
            displayName: 'Publish updated pyproject.toml'

  - stage: Publish
    displayName: 'Publish to PyPI'
    dependsOn: SetVersion
    jobs:
      - job: PublishJob
        displayName: 'Build and publish package'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Set up Python $(pythonVersion)'

          - script: |
              pip install uv==$(uvVersion)
            displayName: 'Install uv'

          - task: DownloadBuildArtifacts@1
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'pyproject-toml'
            displayName: 'Download updated pyproject.toml'

          - script: |
              cp $(Agent.BuildDirectory)/pyproject-toml/pyproject.toml ./pyproject.toml
            displayName: 'Restore updated pyproject.toml'

          - script: |
              uv sync --frozen
            displayName: 'Install dependencies'

          - script: |
              uv build
            displayName: 'Build package'

          - script: |
              uv publish
            displayName: 'Publish package to PyPI'
            env:
              UV_PUBLISH_TOKEN: $(pypiToken)

{%- endif %}
# NOTE: Documentation deployment is not included in this pipeline.
# Azure DevOps has no built-in equivalent to GitHub Pages.
# See docs/azure_docs_hosting_alternatives.md for hosting options
# (Azure Static Web Apps, ReadTheDocs, Netlify, and others).
