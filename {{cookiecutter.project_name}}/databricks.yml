# Databricks Asset Bundle (DAB) configuration
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html
#
# Generated by cookiecutter-dab.
#
# Before your first deployment:
#   1. Replace each workspace.host placeholder with your actual Databricks workspace URL.
#   2. Run: databricks bundle validate --target dev_personal
#   3. Run: databricks bundle deploy  --target dev_personal

bundle:
  name: {{cookiecutter.project_slug}}

# ── Variables ──────────────────────────────────────────────────────────────────
# These defaults are baked in at project creation.
# Any variable can be overridden at deploy time:
#   databricks bundle deploy --target release_{{cookiecutter.databricks_workspace_role}}_dev --var spark_version=15.4.x-scala2.12
variables:
  catalog_prefix:
    description: >-
      Unity Catalog prefix — builds catalog names: {prefix}_dev, {prefix}_test, {prefix}_prod.
      The catalog is a metastore-level object shared across all workspaces in the same environment.
    default: {{cookiecutter.databricks_catalog_prefix}}

  schema_prefix:
    description: >-
      Schema prefix for this project — builds schema names: {prefix}_bronze, {prefix}_silver, {prefix}_gold.
      Encodes the domain / system / department+project this bundle owns (e.g. crm_dyn365, npb_volunteering).
    default: {{cookiecutter.databricks_schema_prefix}}

  catalog_name:
    description: >-
      Full Unity Catalog name for this deployment target.
      {% if cookiecutter.databricks_catalog_suffix -%}
      Using per-layer catalog layout: {prefix}_{env}_{suffix} → {{cookiecutter.databricks_catalog_prefix}}_dev_{{cookiecutter.databricks_catalog_suffix}} / _test_ / _prod_.
      To migrate to per-environment catalogs (recommended), clear databricks_catalog_suffix.
      {%- else -%}
      Overridden per target below: {prefix}_{env} → {{cookiecutter.databricks_catalog_prefix}}_dev / _test / _prod.
      {%- endif %}
    default: {% if cookiecutter.databricks_catalog_suffix %}{{cookiecutter.databricks_catalog_prefix}}_dev_{{cookiecutter.databricks_catalog_suffix}}{% else %}{{cookiecutter.databricks_catalog_prefix}}_dev{% endif %}

  spark_version:
    description: "Databricks Runtime (DBR) version for all job clusters."
    default: {{cookiecutter.databricks_default_spark_version}}

  # SQL warehouse used by dbt jobs (dbt_task runs on a warehouse, not a cluster).
  # Find the ID in Databricks UI → SQL Warehouses → <warehouse> → Overview → HTTP path
  # (the last segment of the path, e.g. /sql/1.0/warehouses/abc123def456 → abc123def456).
  # TODO: replace with your warehouse ID, or override at deploy time:
  #   databricks bundle deploy --var sql_warehouse_id=abc123def456
  sql_warehouse_id:
    description: "SQL warehouse ID used by dbt_task jobs. Find it in SQL Warehouses → HTTP path."
    default: ""

  # dbt target to use when running dbt_task jobs.
  # Mapped to the dbt profile outputs in dbt/profiles.yml (dev / test / prod).
  # Overridden per release target below.
  dbt_target:
    description: "dbt profile target for job runs (dev / test / prod)."
    default: dev

  # Single-node job cluster — suitable for most ingestion and transformation workloads.
  # To define additional cluster profiles, add new complex variables and reference them in resources/.
  job_cluster_single_node:
    description: "Single-node job cluster configuration."
    type: complex
    default:
      spark_version: ${var.spark_version}
      node_type_id: Standard_DS3_v2
      num_workers: 0
      autotermination_minutes: 30
      spark_conf:
        spark.databricks.cluster.profile: singleNode
        spark.master: local[*]
      custom_tags:
        ResourceClass: SingleNode
      data_security_mode: SINGLE_USER
      azure_attributes:
        first_on_demand: 1
        availability: SPOT_WITH_FALLBACK_AZURE
        spot_bid_max_price: 100

# ── Artifacts ─────────────────────────────────────────────────────────────────
# The Python wheel is built with `uv build` and uploaded to the workspace on each deploy.
# Notebooks import from this wheel: from {{cookiecutter.project_slug}}.* import ...
artifacts:
  default:
    type: whl
    build: uv build
    path: .

# ── Sync ──────────────────────────────────────────────────────────────────────
# Files/directories synced to the Databricks workspace on each deploy.
# Notebooks in notebooks/ are synced as workspace files and referenced by jobs.
sync:
  include:
    - notebooks/**
    - dbt/**
  exclude:
    - .git
    - .github
    - azuredevops
    - "*.pyc"
    - __pycache__
    - .venv
    - dist
    - .ruff_cache
    - .mypy_cache
    - .pytest_cache
    - "*.egg-info"

# ── Resources ─────────────────────────────────────────────────────────────────
# Job and pipeline definitions live in resources/**/*.yml.
# Each file is included here and validated by `databricks bundle validate`.
include:
  - resources/**/*.yml

# ── Targets ───────────────────────────────────────────────────────────────────
# A target = one deployment context (who deploys, where, which catalog).
#
# Target naming convention (workspace_role = {{cookiecutter.databricks_workspace_role}}):
#   dev_personal                              — your personal dev workspace folder
#   ci_{{cookiecutter.databricks_workspace_role}}_test                           — CI pipeline validation in TEST workspace
#   release_{{cookiecutter.databricks_workspace_role}}_dev/test/prod             — shared release deployments per environment
#
# Catalog per environment:
#   *_dev  → {{cookiecutter.databricks_catalog_prefix}}_dev
#   *_test → {{cookiecutter.databricks_catalog_prefix}}_test
#   *_prod → {{cookiecutter.databricks_catalog_prefix}}_prod

targets:

  # ── Personal development ─────────────────────────────────────────────────────
  # Deploys to your own home folder in the DEV workspace.
  # Jobs are named with a [dev <username>] prefix automatically (development mode).
  # Use this target for daily development and testing from your IDE or terminal.
  dev_personal:
    mode: development
    default: true
    workspace:
      # TODO: replace with your DEV workspace URL
      # Example: https://adb-mdp-dlz-{{cookiecutter.databricks_workspace_role}}-dev-euw.azuredatabricks.net
      host:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}
    variables:
      catalog_name: {% if cookiecutter.databricks_catalog_suffix %}{{cookiecutter.databricks_catalog_prefix}}_dev_{{cookiecutter.databricks_catalog_suffix}}{% else %}{{cookiecutter.databricks_catalog_prefix}}_dev{% endif %}

  # ── CI validation ────────────────────────────────────────────────────────────
  # Used by the CI pipeline (azuredevops/ci.yml) on Pull Requests.
  # Validates bundle structure and runs the unit-test job — does NOT deploy schedules.
  # Credentials come from DATABRICKS_HOST / DATABRICKS_CLIENT_ID / DATABRICKS_CLIENT_SECRET env vars.
  ci_{{cookiecutter.databricks_workspace_role}}_test:
    mode: production
    workspace:
      # TODO: replace with your TEST workspace URL
      host:
      root_path: /Workspace/ci/${bundle.name}
    presets:
      trigger_pause_status: PAUSED
      pipelines_development: true
    variables:
      catalog_name: {% if cookiecutter.databricks_catalog_suffix %}{{cookiecutter.databricks_catalog_prefix}}_test_{{cookiecutter.databricks_catalog_suffix}}{% else %}{{cookiecutter.databricks_catalog_prefix}}_test{% endif %}

  # ── Release — DEV ────────────────────────────────────────────────────────────
  # Deployed automatically by the CD pipeline on every merge to main.
  # Job schedules are PAUSED — jobs must be triggered manually or via the CD pipeline.
  release_{{cookiecutter.databricks_workspace_role}}_dev:
    mode: production
    workspace:
      # TODO: replace with your DEV workspace URL
      host:
      root_path: /Workspace/release/${bundle.name}
    presets:
      trigger_pause_status: PAUSED
      jobs_max_concurrent_runs: 1
    variables:
      catalog_name: {% if cookiecutter.databricks_catalog_suffix %}{{cookiecutter.databricks_catalog_prefix}}_dev_{{cookiecutter.databricks_catalog_suffix}}{% else %}{{cookiecutter.databricks_catalog_prefix}}_dev{% endif %}
      dbt_target: dev

  # ── Release — TEST ───────────────────────────────────────────────────────────
  # Deployed automatically after DEV deployment succeeds.
  # Job schedules are PAUSED.
  release_{{cookiecutter.databricks_workspace_role}}_test:
    mode: production
    workspace:
      # TODO: replace with your TEST workspace URL
      host:
      root_path: /Workspace/release/${bundle.name}
    presets:
      trigger_pause_status: PAUSED
    variables:
      catalog_name: {% if cookiecutter.databricks_catalog_suffix %}{{cookiecutter.databricks_catalog_prefix}}_test_{{cookiecutter.databricks_catalog_suffix}}{% else %}{{cookiecutter.databricks_catalog_prefix}}_test{% endif %}
      dbt_target: test

  # ── Release — PROD ───────────────────────────────────────────────────────────
  # Deployed after a manual approval gate in the CD pipeline.
  # Job schedules are ACTIVE — jobs run on their defined schedule.
  release_{{cookiecutter.databricks_workspace_role}}_prod:
    mode: production
    workspace:
      # TODO: replace with your PROD workspace URL
      host:
      root_path: /Workspace/release/${bundle.name}
    variables:
      catalog_name: {% if cookiecutter.databricks_catalog_suffix %}{{cookiecutter.databricks_catalog_prefix}}_prod_{{cookiecutter.databricks_catalog_suffix}}{% else %}{{cookiecutter.databricks_catalog_prefix}}_prod{% endif %}
      dbt_target: prod
