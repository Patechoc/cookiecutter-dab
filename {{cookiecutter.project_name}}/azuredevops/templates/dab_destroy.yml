# Reusable template: destroy DAB bundle resources in one environment.
#
# Called by cd_destroy.yml. Removes Databricks jobs, schedules, and uploaded
# artifacts. Does NOT drop Unity Catalog tables or delete any data.

parameters:
  - name: environment
    displayName: 'Environment name (dev / test / prod) — used to select the service connection'
    type: string

  - name: bundle_target
    displayName: 'DAB target name (e.g. release_in_dev)'
    type: string

  - name: key_vault_name
    displayName: 'Azure Key Vault name for this environment'
    type: string

steps:
  # ── 1. Install Databricks CLI ──────────────────────────────────────────────
  - script: |
      curl -fsSL \
        https://raw.githubusercontent.com/databricks/setup-databricks-cli/v0/install.sh \
        | sh
    displayName: 'Install Databricks CLI'

  # ── 2. Fetch credentials from Key Vault ───────────────────────────────────
  - task: AzureKeyVault@2
    inputs:
      azureSubscription: '{{cookiecutter.ado_service_connection_prefix}}-{% raw %}${{ parameters.environment }}{% endraw %}'
      KeyVaultName: {% raw %}${{ parameters.key_vault_name }}{% endraw %}
      SecretsFilter: 'databricks-sp-client-id,databricks-sp-secret'
      RunAsPreJob: false
    displayName: "Fetch Databricks credentials from {% raw %}${{ parameters.key_vault_name }}{% endraw %}"

  # ── 3. Destroy bundle resources ────────────────────────────────────────────
  # --auto-approve: skips the interactive confirmation prompt (required in CI).
  - script: |
      databricks bundle destroy \
        --target {% raw %}${{ parameters.bundle_target }}{% endraw %} \
        --auto-approve
    displayName: "Destroy bundle resources in {% raw %}${{ parameters.bundle_target }}{% endraw %}"
    env:
      DATABRICKS_CLIENT_ID: $(databricks-sp-client-id)
      DATABRICKS_CLIENT_SECRET: $(databricks-sp-secret)
