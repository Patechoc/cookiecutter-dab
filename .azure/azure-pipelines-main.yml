trigger:
  - main

pr:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.12'
  uvVersion: '0.10.10'

stages:
  - stage: Quality
    displayName: 'Quality Checks'
    jobs:
      - job: QualityChecks
        displayName: 'Run Code Quality Tools'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Set up Python $(pythonVersion)'

          - script: |
              pip install uv==$(uvVersion)
            displayName: 'Install uv'

          - task: Cache@2
            inputs:
              key: 'pre-commit | "$(Agent.OS)" | .pre-commit-config.yaml'
              path: '$(HOME)/.cache/pre-commit'
            displayName: 'Cache pre-commit'

          - script: |
              uv sync --frozen
            displayName: 'Install dependencies'

          - script: |
              uv run pre-commit run -a --show-diff-on-failure
            displayName: 'Run pre-commit'

          - script: |
              uv run deptry .
            displayName: 'Inspect dependencies (deptry)'

          - script: |
              uv sync --locked
            displayName: 'Check lock file consistency'

  - stage: TestsAndTypeCheck
    displayName: 'Tests and Type Checking'
    dependsOn: []
    jobs:
      - job: TestsTypeCheck
        displayName: 'Run Tests and Type Checks'
        strategy:
          matrix:
            Python310:
              pythonVersion: '3.10'
            Python311:
              pythonVersion: '3.11'
            Python312:
              pythonVersion: '3.12'
            Python313:
              pythonVersion: '3.13'
            Python314:
              pythonVersion: '3.14'
          maxParallel: 5
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Set up Python $(pythonVersion)'

          - script: |
              pip install uv==$(uvVersion)
            displayName: 'Install uv'

          - script: |
              uv sync --frozen
            displayName: 'Install dependencies'

          - script: |
              uv run python -m pytest tests --cov --cov-config=pyproject.toml --cov-report=xml
            displayName: 'Run pytest with coverage'

          - script: |
              uv run mypy
            displayName: 'Run type checking (mypy)'

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
            condition: eq(variables['pythonVersion'], '3.11')
            displayName: 'Publish coverage reports (Python 3.11)'

  - stage: Documentation
    displayName: 'Documentation Check'
    dependsOn: []
    jobs:
      - job: CheckDocs
        displayName: 'Check if documentation builds'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Set up Python $(pythonVersion)'

          - script: |
              pip install uv==$(uvVersion)
            displayName: 'Install uv'

          - script: |
              uv sync --frozen
            displayName: 'Install dependencies'

          - script: |
              uv run mkdocs build -s
            displayName: 'Build documentation'
