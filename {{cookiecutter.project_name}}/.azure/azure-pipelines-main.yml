trigger:
  - main

pr:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.12'
  uvVersion: '0.10.10'

stages:
  - stage: Quality
    displayName: 'Quality Checks'
    jobs:
      - job: QualityChecks
        displayName: 'Run Code Quality Tools'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
            displayName: 'Set up Python 3.12'

          - script: |
              pip install uv==$(uvVersion)
            displayName: 'Install uv'

          - task: Cache@2
            inputs:
              key: 'pre-commit | "$(Agent.OS)" | .pre-commit-config.yaml'
              path: '$(HOME)/.cache/pre-commit'
            displayName: 'Cache pre-commit'

          - script: |
              uv sync --frozen
            displayName: 'Install dependencies'

          - script: |
              make check
            displayName: 'Run code quality checks'

  - stage: TestsAndTypeCheck
    displayName: 'Tests and Type Checking'
    dependsOn: []
    jobs:
      - job: TestsTypeCheck
        displayName: 'Run Tests and Type Checks'
        strategy:
          matrix:
            Python310:
              pythonVersion: '3.10'
            Python311:
              pythonVersion: '3.11'
            Python312:
              pythonVersion: '3.12'
            Python313:
              pythonVersion: '3.13'
            Python314:
              pythonVersion: '3.14'
          maxParallel: 5
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: $(pythonVersion)
            displayName: 'Set up Python $(pythonVersion)'

          - script: |
              pip install uv==$(uvVersion)
            displayName: 'Install uv'

          - script: |
              uv sync --frozen
            displayName: 'Install dependencies'

          - script: |
              uv run python -m pytest tests {% if cookiecutter.codecov == "y" %}--cov --cov-config=pyproject.toml --cov-report=xml{%- endif %}
            displayName: 'Run pytest{% if cookiecutter.codecov == "y" %} with coverage{% endif %}'

          - script: |
              uv run {% if cookiecutter.type_checker == "mypy" %}mypy{% else %}ty check{% endif %}
            displayName: 'Run type checking'

          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
            condition: eq(variables['pythonVersion'], '3.11')
            displayName: 'Publish coverage reports (Python 3.11)'
            {% if cookiecutter.codecov == "y" %}enabled: true{% else %}enabled: false{% endif %}

{%- if cookiecutter.mkdocs == "y" %}

  - stage: Documentation
    displayName: 'Documentation Check'
    dependsOn: []
    jobs:
      - job: CheckDocs
        displayName: 'Check if documentation builds'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
            displayName: 'Set up Python 3.12'

          - script: |
              pip install uv==$(uvVersion)
            displayName: 'Install uv'

          - script: |
              uv sync --frozen
            displayName: 'Install dependencies'

          - script: |
              uv run mkdocs build -s
            displayName: 'Build documentation'
{%- endif %}
