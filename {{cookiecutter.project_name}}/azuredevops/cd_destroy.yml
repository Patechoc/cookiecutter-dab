# Destroy pipeline — manual trigger only.
#
# Removes all Databricks resources (jobs, schedules, artifacts) deployed by this bundle
# in the chosen environment. This does NOT delete Unity Catalog tables or data.
#
# When to use:
#   - Decommissioning a project
#   - Cleaning up a dev workspace after a feature branch experiment
#   - Rolling back a bad deployment (re-deploy after fixing)
#
# Prerequisites: same service connections and Key Vaults as cd_deploy.yml.
# The '{{cookiecutter.ado_environment_prod}}' ADO Environment has an approval gate — destroying PROD
# requires the same manual approval as deploying to it.

trigger: none
pr: none

parameters:
  - name: environment
    displayName: 'Environment to destroy'
    type: string
    values:
      - dev
      - test
      - prod

stages:
  # ── DEV ────────────────────────────────────────────────────────────────────
  - stage: DestroyDEV
    displayName: 'Destroy → DEV'
    condition: "{% raw %}${{ eq(parameters.environment, 'dev') }}{% endraw %}"
    pool:
      name: '{{cookiecutter.ado_agent_pool_dev}}'
    jobs:
      - deployment: DestroyDEV
        displayName: 'Destroy bundle in DEV'
        environment: '{{cookiecutter.ado_environment_dev}}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: templates/dab_destroy.yml
                  parameters:
                    environment: 'dev'
                    bundle_target: 'release_{{cookiecutter.databricks_workspace_role}}_dev'
                    key_vault_name: '{{cookiecutter.ado_keyvault_name_dev}}'

  # ── TEST ───────────────────────────────────────────────────────────────────
  - stage: DestroyTest
    displayName: 'Destroy → TEST'
    condition: "{% raw %}${{ eq(parameters.environment, 'test') }}{% endraw %}"
    pool:
      name: '{{cookiecutter.ado_agent_pool_test}}'
    jobs:
      - deployment: DestroyTest
        displayName: 'Destroy bundle in TEST'
        environment: '{{cookiecutter.ado_environment_test}}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: templates/dab_destroy.yml
                  parameters:
                    environment: 'test'
                    bundle_target: 'release_{{cookiecutter.databricks_workspace_role}}_test'
                    key_vault_name: '{{cookiecutter.ado_keyvault_name_test}}'

  # ── PROD ───────────────────────────────────────────────────────────────────
  # The '{{cookiecutter.ado_environment_prod}}' ADO Environment has an approval check — destroying
  # PROD requires a human to approve before the stage runs.
  - stage: DestroyProd
    displayName: 'Destroy → PROD'
    condition: "{% raw %}${{ eq(parameters.environment, 'prod') }}{% endraw %}"
    pool:
      name: '{{cookiecutter.ado_agent_pool_prod}}'
    jobs:
      - deployment: DestroyProd
        displayName: 'Destroy bundle in PROD'
        environment: '{{cookiecutter.ado_environment_prod}}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: templates/dab_destroy.yml
                  parameters:
                    environment: 'prod'
                    bundle_target: 'release_{{cookiecutter.databricks_workspace_role}}_prod'
                    key_vault_name: '{{cookiecutter.ado_keyvault_name_prod}}'
