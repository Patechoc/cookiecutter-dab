# CD pipeline — triggered on every merge to main.
#
# Deploys the Databricks Asset Bundle sequentially:
#   DEV  (automatic) → TEST (automatic) → PROD (manual approval gate)
#
# Each stage:
#   1. Fetches service principal credentials from the environment's Azure Key Vault
#      using the service connection {{cookiecutter.ado_service_connection_prefix}}-{env}.
#   2. Builds the Python wheel with `uv build`.
#   3. Deploys the bundle with `databricks bundle deploy`.
#      The workspace URL is read from databricks.yml — no DATABRICKS_HOST needed.
#
# Prerequisites (configured once in Azure DevOps — do not need to create these):
#   - Service connections: {{cookiecutter.ado_service_connection_prefix}}-dev / {{cookiecutter.ado_service_connection_prefix}}-test / {{cookiecutter.ado_service_connection_prefix}}-prod
#   - ADO Environments: {{cookiecutter.ado_environment_dev}} / {{cookiecutter.ado_environment_test}} / {{cookiecutter.ado_environment_prod}}
#     (add an approval check on '{{cookiecutter.ado_environment_prod}}' for the manual gate)
#   - Key Vault secrets in each vault: databricks-sp-client-id, databricks-sp-secret

trigger:
  branches:
    include:
      - main

pr: none  # CD only — not triggered on PRs

stages:
  # ── DEV ────────────────────────────────────────────────────────────────────
  - stage: DeployDEV
    displayName: 'Deploy → DEV'
    pool:
      name: '{{cookiecutter.ado_agent_pool_dev}}'
    jobs:
      - deployment: DeployDEV
        displayName: 'Deploy bundle to DEV workspace'
        environment: '{{cookiecutter.ado_environment_dev}}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/dab_deploy.yml
                  parameters:
                    environment: 'dev'
                    bundle_target: 'release_{{cookiecutter.databricks_workspace_role}}_dev'
                    key_vault_name: '{{cookiecutter.ado_keyvault_name_dev}}'

  # ── TEST ───────────────────────────────────────────────────────────────────
  - stage: DeployTest
    displayName: 'Deploy → TEST'
    dependsOn: DeployDEV
    condition: succeeded('DeployDEV')
    pool:
      name: '{{cookiecutter.ado_agent_pool_test}}'
    jobs:
      - deployment: DeployTest
        displayName: 'Deploy bundle to TEST workspace'
        environment: '{{cookiecutter.ado_environment_test}}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/dab_deploy.yml
                  parameters:
                    environment: 'test'
                    bundle_target: 'release_{{cookiecutter.databricks_workspace_role}}_test'
                    key_vault_name: '{{cookiecutter.ado_keyvault_name_test}}'

  # ── PROD ───────────────────────────────────────────────────────────────────
  # Manual approval gate is configured on the '{{cookiecutter.ado_environment_prod}}' ADO Environment.
  # The pipeline pauses here until an approver accepts or rejects.
  - stage: DeployProd
    displayName: 'Deploy → PROD'
    dependsOn: DeployTest
    condition: succeeded('DeployTest')
    pool:
      name: '{{cookiecutter.ado_agent_pool_prod}}'
    jobs:
      - deployment: DeployProd
        displayName: 'Deploy bundle to PROD workspace'
        environment: '{{cookiecutter.ado_environment_prod}}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - template: templates/dab_deploy.yml
                  parameters:
                    environment: 'prod'
                    bundle_target: 'release_{{cookiecutter.databricks_workspace_role}}_prod'
                    key_vault_name: '{{cookiecutter.ado_keyvault_name_prod}}'
